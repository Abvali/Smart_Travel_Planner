<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="leaflet/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <script type="module" src="js/app.js"></script>
    <title>Smart Travel Planner</title>
  </head>

  <body>
    <header class="header">
      <h1>Smart Travel Planner ✈️</h1>

      <div class="search">
        <input id="search-input" type="text" placeholder="Enter a city..." />
        <button id="search-btn">Search</button>
        <div id="suggestions"></div>
      </div>
    </header>

    <div class="container">
      <!-- LEFT SIDE -->
      <div class="left">
        <div class="city-card">
          <div id="map"></div>
        </div>

        <div class="cards">
          <div class="card">
            <h3>Trip To-Do List</h3>

            <div class="todo-input">
              <input type="text" placeholder="Add a new task..." />
              <button>Add</button>
            </div>

            <ul id="todo-List">
              <li>✔ Book flight tickets 🗑</li>
              <li>✔ Reserve hotel 🗑</li>
              <li>✔ Pack travel guide 🗑</li>
              <li>✔ Try croissants 🗑</li>
            </ul>
          </div>

          <div class="card">
            <h3>Travel Packing Checklist</h3>

            <ul>
              <li>☑ Passport</li>
              <li>☑ Camera</li>
              <li>☑ Phone Charger</li>
            </ul>

            <a href="#">+ Add Item</a>
          </div>
        </div>
      </div>

      <!-- RIGHT SIDE -->

      <div class="right">
       <div class="weather-details">
        <h2 class="city-name"></h2>
        <div class="weather">
        <img class="weather-icon" src="" alt="weather icon" />
        <span class="temp"></span>
        <p class="description"></p>
        <p class="humidity"></p>
       <p class="wind"></p>
      </div>
</div>
        </div>

        <div class="card">
          <h3>Trip Summary</h3>

          <ul>
            <li>Paris</li>
            <li>Berlin</li>
            <li>Rome</li>
          </ul>

          <button>Clear List</button>
        </div>
      </div>
    </div>
  </body>
</html>
