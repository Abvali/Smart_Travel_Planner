<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="leaflet/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />

    <script type="module" src="js/app.js"></script>
    <title>Smart Travel Planner</title>
  </head>

  <body>
    <header class="header">
      <h1>Smart Travel Planner ✈️</h1>

      <div class="search">
        <input
          id="search-input"
          type="text"
          placeholder="Enter a city..."
          autocomplete="off"
        />
        <button id="search-btn">Search</button>
        <div id="suggestions"></div>
      </div>
    </header>

    <div class="container">
      <!-- LEFT SIDE -->
      <div class="left">
        <div class="city-card">
          <div id="map"></div>

          <div class="weather-card">
            <div class="weather-info">
              <div class="info location">
                <h3 id="city">Paris, France</h3>
              </div>

              <div class="divider"></div>

              <div class="info">
                <div id="forecast" class="forecast"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="cards">
          <div class="card">
            <h3>Trip To-Do List</h3>

            <div class="todo-input">
              <input
                id="todo-input"
                type="text"
                placeholder="Add a new task..."
                autocomplete="off"
              />
              <button id="todo-btn">Add</button>
            </div>
            <ul id="todo-List"></ul>
          </div>

          <div class="card">
            <h3>Travel Packing Checklist</h3>
            <ul id="packing-List"></ul>

            <button id="add-item-btn">Add Item</button>
            <button id="delete-all-btn">Delete All</button>
          </div>
        </div>
      </div>

      <!-- RIGHT SIDE -->
      <div class="right">
        <div id="attraction-details" class="details"></div>

        <div class="card">
          <h3>Trip Summary</h3>

          <ul>
            <li>Paris</li>
            <li>Berlin</li>
            <li>Rome</li>
          </ul>

          <button>Clear List</button>
        </div>
      </div>
    </div>
  </body>
</html>
